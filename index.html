<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Android – Egzamin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a1f2e 0%, #0f1117 100%);
    border-bottom: 2px solid #3ddc84;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .android-logo {
    width: 36px; height: 36px;
    background: #3ddc84;
    border-radius: 50% 50% 0 0;
    position: relative;
  }
  .android-logo::before, .android-logo::after {
    content: '';
    position: absolute;
    width: 4px; height: 10px;
    background: #3ddc84;
    border-radius: 2px;
    top: -10px;
  }
  .android-logo::before { left: 6px; transform: rotate(-20deg); }
  .android-logo::after { right: 6px; transform: rotate(20deg); }
  h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
  .subtitle { font-size: 0.75rem; color: #3ddc84; letter-spacing: 0.1em; text-transform: uppercase; }

  .score-pill {
    background: #1e2535;
    border: 1px solid #3ddc84;
    border-radius: 24px;
    padding: 8px 20px;
    font-size: 0.9rem;
    color: #3ddc84;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* PROGRESS */
  .progress-bar-wrap {
    background: #1a1f2e;
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid #1e2535;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: #1e2535;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3ddc84, #00b4d8);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 0.8rem; color: #64748b; white-space: nowrap; }

  /* MAIN */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* CATEGORY BADGE */
  .category-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1e2535;
    border: 1px solid #3ddc8440;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.72rem;
    color: #3ddc84;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* QUESTION CARD */
  .question-card {
    background: #1a1f2e;
    border: 1px solid #1e2535;
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #3ddc84, #00b4d8);
  }
  .question-number {
    font-size: 0.72rem;
    color: #3ddc84;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .question-text {
    font-size: 1.05rem;
    line-height: 1.65;
    color: #e2e8f0;
    font-weight: 500;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    background: #0f1117;
    border: 1.5px solid #1e2535;
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    color: #cbd5e1;
    font-size: 0.95rem;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) {
    border-color: #3ddc8480;
    background: #1a1f2e;
    transform: translateX(3px);
  }
  .option-btn:disabled { cursor: default; }

  .option-letter {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #1e2535;
    border: 1.5px solid #2d3748;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: #64748b;
    transition: all 0.2s;
  }

  /* States */
  .option-btn.correct {
    border-color: #3ddc84;
    background: #3ddc8415;
  }
  .option-btn.correct .option-letter {
    background: #3ddc84;
    border-color: #3ddc84;
    color: #0f1117;
  }
  .option-btn.wrong {
    border-color: #f43f5e;
    background: #f43f5e10;
  }
  .option-btn.wrong .option-letter {
    background: #f43f5e;
    border-color: #f43f5e;
    color: #fff;
  }
  .option-btn.revealed-correct {
    border-color: #3ddc8440;
    background: #3ddc840a;
    opacity: 0.7;
  }
  .option-btn.revealed-correct .option-letter {
    background: #3ddc84;
    border-color: #3ddc84;
    color: #0f1117;
  }

  /* FEEDBACK */
  .feedback {
    display: none;
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.88rem;
    line-height: 1.5;
    align-items: flex-start;
    gap: 10px;
  }
  .feedback.show { display: flex; }
  .feedback.ok { background: #3ddc8415; border: 1px solid #3ddc8440; color: #3ddc84; }
  .feedback.err { background: #f43f5e10; border: 1px solid #f43f5e40; color: #f87171; }
  .feedback-icon { font-size: 1.1rem; flex-shrink: 0; }

  /* NEXT BUTTON */
  .nav-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 24px;
  }
  .btn-next {
    background: #3ddc84;
    color: #0f1117;
    border: none;
    border-radius: 10px;
    padding: 14px 32px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-next:hover { background: #2bc872; transform: translateY(-1px); }
  .btn-next.show { display: flex; }

  /* RESULTS */
  #results {
    display: none;
    text-align: center;
    padding: 60px 24px;
  }
  #results.show { display: block; }
  .results-emoji { font-size: 5rem; margin-bottom: 20px; }
  .results-score {
    font-size: 4rem;
    font-weight: 900;
    background: linear-gradient(135deg, #3ddc84, #00b4d8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .results-label { color: #64748b; margin: 8px 0 32px; font-size: 1rem; }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 500px;
    margin: 0 auto 40px;
  }
  .results-stat {
    background: #1a1f2e;
    border: 1px solid #1e2535;
    border-radius: 12px;
    padding: 20px;
  }
  .results-stat-value { font-size: 2rem; font-weight: 800; color: #e2e8f0; }
  .results-stat-label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
  .btn-restart {
    background: #3ddc84;
    color: #0f1117;
    border: none;
    border-radius: 12px;
    padding: 16px 40px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-restart:hover { background: #2bc872; }

  #quiz-area { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <div class="android-logo"></div>
    <div>
      <div class="subtitle">Egzamin</div>
      <h1>Android Quiz</h1>
    </div>
  </div>
  <div class="score-pill">
    <span>✓</span>
    <span id="header-score">0 / 87</span>
  </div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-label" id="progress-label">Pytanie 1 z 87</div>
</div>

<main>
  <div id="quiz-area">
    <div class="category-badge" id="category-badge">📁 Kategoria</div>
    <div class="question-card">
      <div class="question-number" id="q-number">PYTANIE 1</div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="options-list"></div>
      <div class="feedback" id="feedback">
        <span class="feedback-icon" id="fb-icon"></span>
        <span id="fb-text"></span>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Następne pytanie →</button>
    </div>
  </div>

  <div id="results">
    <div class="results-emoji" id="results-emoji">🎉</div>
    <div class="results-score" id="results-score">0%</div>
    <div class="results-label">Twój wynik końcowy</div>
    <div class="results-grid">
      <div class="results-stat">
        <div class="results-stat-value" id="r-correct" style="color:#3ddc84">0</div>
        <div class="results-stat-label">Poprawnych</div>
      </div>
      <div class="results-stat">
        <div class="results-stat-value" id="r-wrong" style="color:#f43f5e">0</div>
        <div class="results-stat-label">Błędnych</div>
      </div>
      <div class="results-stat">
        <div class="results-stat-value" id="r-total">87</div>
        <div class="results-stat-label">Łącznie</div>
      </div>
    </div>
    <button class="btn-restart" onclick="restartQuiz()">🔄 Zacznij od nowa</button>
  </div>
</main>

<script>
const QUESTIONS = [
  // === ARCHITEKTURA I STRUKTURA ===
  { cat: "🏗️ Architektura i struktura projektu", q: "W skład projektu aplikacji dla systemu Android wchodzą:", opts: ["Tylko pliki źródłowe java/kotlin","Pliki źródłowe, pliki zasobów, biblioteki","Tylko pliki źródłowe stworzone przez programistę i pliki wygenerowane automatycznie (np. klasa R)","Tylko pliki źródłowe i pliki zasobów"], ans: 1 },
  { cat: "🏗️ Architektura i struktura projektu", q: "Zależności aplikacji (dodatkowe biblioteki) określa się w pliku:", opts: ["AndroidManifest.xml","build.gradle","dependencies.gradle","project.properties"], ans: 1 },
  { cat: "🏗️ Architektura i struktura projektu", q: "Standardowo do projektu w Android Studio nie jest dołączana biblioteka:", opts: ["rt.jar","android.jar","jfx.jar","androidx"], ans: 2 },
  { cat: "🏗️ Architektura i struktura projektu", q: "W warstwie bibliotek nie znajduje się:", opts: ["zarządca aktywności","baza danych","obsługa SSL","silnik renderowania stron"], ans: 0 },
  { cat: "🏗️ Architektura i struktura projektu", q: "W systemie Android można wyróżnić następujące warstwy:", opts: ["kernel / biblioteki / framework aplikacji / aplikacje","core os / core services / warstwy multimediów / cocoa touch","core system / mobile core / phone shell","kernel / biblioteki / framework aplikacji / app launcher"], ans: 0 },
  { cat: "🏗️ Architektura i struktura projektu", q: "Opis aplikacji przeznaczonej dla Androida zawiera:", opts: ["plik manifestu w formacie JSON","plik manifestu w formacie XML","plik project.properties","plik android.app"], ans: 1 },
  { cat: "🏗️ Architektura i struktura projektu", q: "Ustawienie targetSdk w pliku build.gradle oznacza:", opts: ["minimalną wersję Androida (API Level) wymaganą przez aplikację","SDK wykorzystywane do skompilowania projektu","wersję Androida (API Level), której uwzględnia aplikacja","SDK, do którego autor dostosuje aplikację w przyszłości"], ans: 2 },
  { cat: "🏗️ Architektura i struktura projektu", q: "Klasy rozmiaru okna, które należy uwzględnić tworząc aplikację dla Androida to:", opts: ["telefon / tablet / TV","watch / phone / tablet","portrait / landscape","kompaktowa / średnia / rozszerzona"], ans: 3 },
  // === LAYOUTY, WIDOKI, STYLE ===
  { cat: "🎨 Layouty, widoki i style", q: "Na określenie rozmieszczenia elementów względem innych pozwala:", opts: ["ConstraintLayout","LinearLayout","TableLayout","FrameLayout"], ans: 0 },
  { cat: "🎨 Layouty, widoki i style", q: "Zarządcą układu we frameworku Android nie jest:", opts: ["FixedLayout","FrameLayout","LinearLayout","TableLayout"], ans: 0 },
  { cat: "🎨 Layouty, widoki i style", q: "Klasą bazową dla pojemników (m.in. layoutów) jest klasa:", opts: ["Layout","LayoutBase","WidgetGroup","ViewGroup"], ans: 3 },
  { cat: "🎨 Layouty, widoki i style", q: "Klasą bazową wszystkich komponentów graficznych w Androidzie jest klasa:", opts: ["Component","Control","View","Widget"], ans: 2 },
  { cat: "🎨 Layouty, widoki i style", q: "Do rozmieszczania elementów w jednym wierszu lub w jednej kolumnie służy:", opts: ["FixedLayout","LinearLayout","RelativeLayout","TableLayout"], ans: 1 },
  { cat: "🎨 Layouty, widoki i style", q: "Style:", opts: ["istnieją tylko jako standardowe style wbudowane w Androida","pozwalają na zdefiniowanie zestawów atrybutów i stosowanie ich do komponentów","nie obsługują dziedziczenia","są definiowane w plikach css"], ans: 1 },
  { cat: "🎨 Layouty, widoki i style", q: "W aplikacjach dla Androida style:", opts: ["tworzy się w pliku XML, którego głównym elementem jest element &lt;style&gt;","tworzy się w pliku XML, którego głównym elementem jest element &lt;resources&gt;","tworzy się w pliku XML, zawierającym layout aktywności","tworzy się za pomocą klasy w kodzie Java"], ans: 1 },
  { cat: "🎨 Layouty, widoki i style", q: "Które stwierdzenie na temat stylów nie jest prawdziwe?", opts: ["styl dziedziczy po stylu, którego nazwa jest określona w atrybucie parent","styl dziedziczy po stylu, którego nazwa jest przed kropką w atrybucie name","styl dziedziczy po stylu, którego nazwa jest przed ukośnikiem w atrybucie name","styl można zastosować jako motyw (ang. theme)"], ans: 2 },
  { cat: "🎨 Layouty, widoki i style", q: "Lista stanów:", opts: ["typ wyliczeniowy określający stany, w których może znajdować się komponent graficzny","klasa określająca wygląd komponentu w zależności od jego stanu","to plik XML, określający stany, w których może znajdować się komponent graficzny","to plik XML, określający wygląd komponentu w zależności od jego stanu"], ans: 3 },
  { cat: "🎨 Layouty, widoki i style", q: "Które stwierdzenie na temat kwalifikatorów zasobów w projekcie aplikacji dla Androida jest nieprawdziwe?", opts: ["pozwalają na oznaczenie elementów graficznych przeznaczonych dla określonych gęstości pikseli","pozwalają na oznaczenie zbiorów tekstów przeznaczonych dla określonych języków","pozwalają na oznaczenie układów elementów przeznaczonych dla określonych rozmiarów ekranów","wymagają uwzględnienia w kodzie Java"], ans: 3 },
  { cat: "🎨 Layouty, widoki i style", q: "Atrybut, którego postaci nie występują w standardowych layoutach (jako powszechna forma dla standardowych komponentów Androida):", opts: ["android:własność=\"wartość\"","tools:właściwość=\"wartość\"","app:właściwość=\"wartość\"","właściwość=\"wartość\""], ans: 3 },
  { cat: "🎨 Layouty, widoki i style", q: "Jednostka specjalnie przewidziana do określania rozmiaru tekstu to:", opts: ["mm","px","dp","sp"], ans: 3 },
  { cat: "🎨 Layouty, widoki i style", q: "Graficzny interfejs użytkownika w Androidzie można stworzyć:", opts: ["tylko wykorzystując kod Java/Kotlin","tylko wykorzystując pliki XML","zarówno w kodzie jak i za pomocą plików XAML","zarówno w kodzie Java/Kotlin jak i za pomocą plików XML"], ans: 3 },
  { cat: "🎨 Layouty, widoki i style", q: "Obsługi zdarzeń w Androidzie nie realizuje się za pomocą:", opts: ["rejestrowania obiektów słuchaczy, wyrażeń lambda lub referencji do metod","ustawiania w komponencie wskaźnika do funkcji obsługującej zdarzenie","definiowania atrybutu android:onClick w pliku XML","zastępowania metody obsługującej zdarzenie w klasie pochodnej"], ans: 1 },
  { cat: "🎨 Layouty, widoki i style", q: "Opcje na pasku aplikacji:", opts: ["tworzy się w metodzie onCreateAppBarMenu() a obsługuje w onAppBarItemSelected()","tworzy się w metodzie onCreateOptionsMenu() a obsługuje w onAppBarItemSelected()","tworzy się w metodzie onCreateOptionsMenu() a obsługuje w onOptionsItemSelected()","tworzy się w metodzie onCreateAppBarMenu() a obsługuje w onOptionsItemSelected()"], ans: 2 },
  { cat: "🎨 Layouty, widoki i style", q: "Hierarchia stosowania atrybutów jest we właściwej kolejności (od najbardziej szczegółowego/nadpisującego do najogólniejszego):", opts: ["atrybuty z motywów zastosowane do większych grup widoków, atrybuty określone programowo, atrybuty ze stylów zastosowanych do widoku, atrybuty z motywów zastosowane do konkretnego widoku","atrybuty ze stylów zastosowanych do widoku, atrybuty określone programowo, atrybuty ze stylów zastosowanych do większych grup widoków, atrybuty określone programowo","atrybuty określone programowo, atrybuty zastosowane do konkretnego widoku (w XML), atrybuty ze stylów zastosowanych do widoku, atrybuty z motywów zastosowane do większych grup widoków","atrybuty zastosowane do konkretnego widoku, atrybuty określone programowo, atrybuty ze stylów zastosowanych do widoku, atrybuty z motywów zastosowane do większych grup widoków"], ans: 2 },

  { cat: "🧵 Wątki i współbieżność", q: "Klasa Handler służy do:", opts: ["obsługi przychodzących połączeń sieciowych","obsługi zdarzeń interfejsu użytkownika","zarządzania grupą wątków","wykonywania zadań w określonym (niekoniecznie głównym) wątku (do przekazywania zadań do wykonania między wątkami)"], ans: 3 },  
  // === CYKL ŻYCIA I AKTYWNOŚCI ===
  { cat: "🔄 Cykl życia i aktywności", q: "Metody związane z cyklem życia aplikacji są wykonywane w następującej kolejności:", opts: ["onCreate(), onStart(), onResume(), onPause(), onStop(), onDestroy()","onCreate(), onResume(), onStart(), onStop(), onPause(), onDestroy()","onCreate(), onStart(), onResume(), onStop(), onPause(), onDestroy()","onCreate(), onStart(), onStop(), onDestroy()"], ans: 0 },
  { cat: "🔄 Cykl życia i aktywności", q: "Które ze stwierdzeń dotyczących aktywności nie jest prawdziwe?", opts: ["stan aktywności można zachować/odtworzyć za pomocą metod onSaveInstanceState() / onRestoreInstanceState()","stan aktywności można zachować/odtworzyć za pomocą metod onSaveInstanceState() / onCreate()","stan aktywności zachowywany jest automatycznie bez ingerencji programisty","standardowo aktywności są niszczone i tworzone na nowo przy zmianie konfiguracji"], ans: 2 },
  { cat: "🔄 Cykl życia i aktywności", q: "Aktywności nie można uruchomić za pomocą:", opts: ["metody startActivity(intencja)","metody launchMode(intencja) z klasy ActivityResultLauncher","metody executeActivity(nazwaAktywności)","metody startActivityForResult(intencja)"], ans: 2 },
  { cat: "🔄 Cykl życia i aktywności", q: "Które stwierdzenie dotyczące obiektu pochodnego ViewModel nie jest prawdziwe:", opts: ["przechowuje dane wyświetlane w widoku","jego czas życia jest dłuższy niż aktywności","można uzyskać do niego dostęp za pomocą obiektu ViewModelProvider","jest komponentem prezentującym dane"], ans: 3 },
  // === USŁUGI, WĄTKI ===
  { cat: "⚙️ Usługi, wątki i zadania w tle", q: "Które ze stwierdzeń dotyczących usług (pochodzących z klasy Service) nie jest prawdziwe:", opts: ["domyślnie klasy pochodne nie uruchamiają własnych wątków","umożliwiają wykonywanie zadań w tle nawet gdy aplikacja nie jest widoczna na ekranie","służą do wykonywania krótkotrwałych działań","mogą pracować na rzecz innych aplikacji"], ans: 2 },

// Shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let questions = shuffle(QUESTIONS);
let current = 0;
let correct = 0;
let answered = false;

function renderQuestion() {
  const q = questions[current];
  document.getElementById('category-badge').textContent = q.cat;
  document.getElementById('q-number').textContent = `PYTANIE ${current + 1}`;
  document.getElementById('q-text').textContent = q.q;

  const total = questions.length;
  document.getElementById('progress-fill').style.width = `${(current / total) * 100}%`;
  document.getElementById('progress-label').textContent = `Pytanie ${current + 1} z ${total}`;

  // Shuffle options
  const idxMap = q.opts.map((_, i) => i);
  const shuffled = shuffle(idxMap);
  const letters = ['A','B','C','D'];

  const container = document.getElementById('options-list');
  container.innerHTML = '';
  shuffled.forEach((origIdx, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.orig = origIdx;
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${q.opts[origIdx]}</span>`;
    btn.addEventListener('click', () => selectAnswer(btn, origIdx));
    container.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').className = 'btn-next';
  answered = false;
}

function selectAnswer(btn, origIdx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const isCorrect = origIdx === q.ans;
  const fb = document.getElementById('feedback');
  const allBtns = document.querySelectorAll('.option-btn');

  allBtns.forEach(b => {
    b.disabled = true;
    const bOrig = parseInt(b.dataset.orig);
    if (bOrig === q.ans && bOrig !== origIdx) {
      b.classList.add('revealed-correct');
    }
  });

  if (isCorrect) {
    btn.classList.add('correct');
    correct++;
    fb.className = 'feedback ok show';
    document.getElementById('fb-icon').textContent = '✓';
    document.getElementById('fb-text').textContent = 'Poprawna odpowiedź!';
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback err show';
    document.getElementById('fb-icon').textContent = '✗';
    document.getElementById('fb-text').textContent = `Błąd. Poprawna odpowiedź to: ${q.opts[q.ans]}`;
  }

  document.getElementById('header-score').textContent = `${correct} / ${questions.length}`;
  document.getElementById('btn-next').className = 'btn-next show';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  document.getElementById('quiz-area').style.display = 'none';
  const results = document.getElementById('results');
  results.className = 'show';
  const pct = Math.round((correct / questions.length) * 100);
  document.getElementById('results-score').textContent = `${pct}%`;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = questions.length - correct;
  document.getElementById('r-total').textContent = questions.length;
  document.getElementById('results-emoji').textContent =
    pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '😊' : '📚';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = `Ukończono! ${pct}%`;
}

function restartQuiz() {
  questions = shuffle(QUESTIONS);
  current = 0; correct = 0;
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('results').className = '';
  document.getElementById('header-score').textContent = `0 / ${questions.length}`;
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
